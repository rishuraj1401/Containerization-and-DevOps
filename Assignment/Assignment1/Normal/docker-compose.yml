version: "3.9"

services:

  database:
    build: ./database
    container_name: postgres_db_unopt
    volumes:
      - postgres_data_unopt:/var/lib/postgresql/data
    networks:
      mynet:
        ipv4_address: 172.24.20.10

  backend:
    build: ./backend
    container_name: backend_api_unopt
    depends_on:
      - database
    environment:
      DB_HOST: 172.24.20.10
      DB_USER: appuser
      DB_PASSWORD: securepassword
      DB_NAME: appdb
    networks:
      mynet:
        ipv4_address: 172.24.20.20

  frontend:
    build: ./frontend
    container_name: frontend_ui_unopt
    networks:
      mynet:
        ipv4_address: 172.24.20.30

volumes:
  postgres_data_unopt:

networks:
  mynet:
    external: true